<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clock Widget</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 50px; display: flex; justify-content: center; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 800px; border: 1px solid #333; display: flex; gap: 30px; }
        .column-left { flex: 1; }
        .column-right { flex: 1; border-left: 1px solid #333; padding-left: 30px; display: flex; flex-direction: column; justify-content: center; }
        h2 { margin-top: 0; color: #4facfe; }
        .group { background: #252525; padding: 15px; margin: 15px 0; border-radius: 8px; }
        label { display: block; margin: 10px 0; cursor: pointer; font-size: 14px; }
        input[type="checkbox"] { margin-right: 12px; transform: scale(1.2); }
        input[type="text"] { width: 100%; padding: 12px; background: #000; color: #0f0; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; margin-bottom: 15px; }
        button { width: 100%; padding: 15px; background: #4facfe; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #008efb; }
    </style>
</head>
<body>
    <div class="card">
        <div class="column-left">
            <h2>Options</h2>
            <div class="group">
                <strong>OBS Studio Websocket Settings</strong>
                </label><label>Host: <input type="text" name="host" class="opt" value="127.0.0.1"></label>
                </label><label>Port: <input type="text" name="port" class="opt" value="4455"></label>
                </label></label><label>Password: <input type="text" name="password" class="opt" value=""></label>
            </div>
        </div>
        <div class="column-right">
            <h2>Widget URL</h2>
            <p style="font-size: 12px; color: #888;">Settings are active by default. Copy this link:</p>
            <input type="text" id="result-url" readonly>
            <button onclick="copyUrl()">Copy URL</button>
        </div>
    </div>
    <script>
        const checks = document.querySelectorAll('.opt');
        const out = document.getElementById('result-url');
        function build() {
            let base = window.location.href.replace('settings.html', 'index.html');
            let p = new URLSearchParams();
            checks.forEach(c => { if(c.checked) p.append(c.dataset.p, 'true'); });
            out.value = p.toString() ? base + '?' + p.toString() : base;
        }
        function copyUrl() { out.select(); document.execCommand('copy'); alert('Copied!'); }
        checks.forEach(c => c.addEventListener('change', build));
        build(); // Run immediately to show full URL on start
    </script>
</body>
</html>
